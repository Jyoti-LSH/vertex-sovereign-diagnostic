<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Diagnostic — Vertex Sovereign Diagnostic™</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="brand">VERTEX<span class="dot">.</span><small>Sovereign Diagnostic</small></div>
    <div class="navlinks"><span class="muted small">Confidential · Private</span></div>
  </div>
</div>

<section class="section">
  <div class="wrap narrow">
    <div id="quiz">
      <div class="progress"><i id="bar"></i></div>
      <div class="step-label" id="step-label">Loading…</div>
      <div class="panel q-card" id="q-card"></div>
      <div class="q-nav">
        <button class="btn btn-ghost" id="back-btn" style="visibility:hidden;">← Back</button>
        <button class="btn btn-gold" id="next-btn" disabled>Continue →</button>
      </div>
    </div>
    <div id="processing" class="processing" style="display:none;">
      <div class="spinner"></div>
      <h2 id="proc-msg" style="font-size:1.3rem;">Analysing your global footprint…</h2>
      <p class="muted">Generating your Sovereign Diagnostic. This will take a moment.</p>
    </div>
  </div>
</section>

<script src="js/scoring.js"></script>
<script src="js/store.js"></script>
<script src="js/diagnostic.js"></script>
</body>
</html>
